<!doctype html>
<html lang="ko">
<!-- 
  @author: kodeholic (powered by Claude)
  @description: 0xLENS LiveChat Client — Brand-aligned design
-->
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>0xLENS — LiveChat</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0B0F19">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="img/icon-192.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Pretendard', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              brand: {
                rust: '#E45B25',
                cyan: '#00F0FF',
                dark: '#0B0F19',
                surface: '#151B2B',
                border: 'rgba(255,255,255,0.1)',
              },
            },
          },
        },
      };
    </script>
    <style>
      html,
      body {
        height: 100%;
        height: 100dvh;
      }
      body {
        -webkit-tap-highlight-color: transparent;
        overflow: hidden;
        background-color: #0B0F19;
      }
      .no-select {
        user-select: none;
        -webkit-user-select: none;
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track { background: #0B0F19; }
      ::-webkit-scrollbar-thumb {
        background-color: #334155;
        border-radius: 2px;
      }
      select:disabled, input:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      @keyframes toast-in {
        from { opacity: 0; transform: translateX(100%); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes toast-out {
        from { opacity: 1; transform: translateX(0); }
        to   { opacity: 0; transform: translateX(100%); }
      }
      .toast-enter { animation: toast-in 0.25s ease-out; }
      .toast-exit  { animation: toast-out 0.25s ease-in forwards; }
      .conf-tile {
        background: #151B2B;
        border-radius: 0.75rem;
        border: 2px solid rgba(255,255,255,0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        min-height: 0;
        position: relative;
        overflow: hidden;
        transition: border-color 0.2s;
      }
      .conf-tile.is-me {
        border-color: #E45B25;
      }
      @keyframes ptt-ripple {
        0% { transform: scale(0.8); opacity: 0.6; }
        100% { transform: scale(1.3); opacity: 0; }
      }
      @keyframes ptt-breathe {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.05); }
      }
      .conf-tile .avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: rgba(255,255,255,0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        font-weight: 700;
        color: #e2e8f0;
      }
      .conf-tile .name {
        font-size: 0.75rem;
        color: #cbd5e1;
        text-align: center;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding: 0 0.5rem;
      }
    </style>
  </head>
  <body
    class="bg-brand-dark text-gray-300 font-sans antialiased flex flex-col relative"
  >
    <!-- Header -->
    <header class="bg-brand-surface border-b border-white/10 flex-none z-10">
      <div
        class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <!-- 0xLENS CI Logo -->
          <a href="../../index.html" class="flex items-baseline shrink-0">
            <span class="font-mono text-xl font-extrabold tracking-tight">
              <span class="text-brand-rust">0x</span><span class="text-white">LENS</span>
            </span>
          </a>
          <span class="text-xs font-mono text-brand-cyan/50 tracking-wider hidden sm:inline">CLIENT</span>
        </div>
        <span
          id="app-version"
          class="text-xs text-gray-500 font-mono"
        ></span>
        <div class="flex items-center gap-2">
          <span
            id="ws-badge"
            class="px-2 py-0.5 rounded text-xs font-medium font-mono flex items-center gap-1 bg-brand-surface text-gray-500 border border-white/10"
            ><i class="ph ph-wifi-slash text-sm"></i><span>OFF</span></span
          >
          <button
            id="btn-settings"
            class="w-8 h-8 rounded-full bg-brand-surface border border-white/10 text-gray-400 flex items-center justify-center hover:bg-white/5 transition-colors"
            title="설정"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.573-1.066z"
              />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- 설정 패널 (overlay) -->
    <div
      id="settings-panel"
      class="hidden absolute left-0 right-0 bg-brand-surface border-b border-white/10 px-4 py-3 z-30 shadow-lg"
      style="top: 56px"
    >
      <div class="max-w-lg mx-auto space-y-3">
        <div class="flex items-center justify-between">
          <span class="text-xs text-gray-400 font-medium">화질</span>
          <select
            id="set-preset"
            class="bg-brand-dark border border-white/10 rounded px-2 py-1 text-xs text-white font-mono"
          >
            <option value="eco">절약 (480p/15fps/300kbps)</option>
            <option value="normal">일반 (480p/24fps/500kbps)</option>
            <option value="hd" selected>HD (720p/24fps/1.5Mbps)</option>
            <option value="hd+">HD+ (720p/30fps/2Mbps)</option>
            <option value="fhd">FHD (1080p/30fps/2.5Mbps)</option>
          </select>
        </div>
        <!-- 장치 선택 -->
        <div class="pt-2 border-t border-white/5 space-y-3">
          <div class="flex items-center justify-between">
            <span class="text-xs text-gray-400 font-medium flex items-center gap-1.5">
              <i class="ph ph-microphone text-sm text-brand-cyan/70"></i>
              마이크
            </span>
            <select id="set-mic" class="bg-brand-dark border border-white/10 rounded px-2 py-1 text-xs text-white font-mono max-w-[200px] truncate">
              <option value="">기본 장치</option>
            </select>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-xs text-gray-400 font-medium flex items-center gap-1.5">
              <i class="ph ph-speaker-high text-sm text-brand-cyan/70"></i>
              스피커
            </span>
            <select id="set-speaker" class="bg-brand-dark border border-white/10 rounded px-2 py-1 text-xs text-white font-mono max-w-[200px] truncate">
              <option value="">기본 장치</option>
            </select>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-xs text-gray-400 font-medium flex items-center gap-1.5">
              <i class="ph ph-video-camera text-sm text-brand-cyan/70"></i>
              카메라
            </span>
            <select id="set-camera" class="bg-brand-dark border border-white/10 rounded px-2 py-1 text-xs text-white font-mono max-w-[200px] truncate">
              <option value="">기본 장치</option>
            </select>
          </div>
        </div>
        <!-- 오디오 설정 -->
        <div class="pt-2 border-t border-white/5 space-y-3">
          <div class="flex items-center justify-between">
            <span class="text-xs text-gray-400 font-medium flex items-center gap-1.5">
              <i class="ph ph-speaker-high text-sm text-brand-cyan/70"></i>
              수신 볼륨
            </span>
            <div class="flex items-center gap-2">
              <input id="set-output-vol" type="range" min="0" max="100" value="100" step="5"
                class="w-24 h-1 accent-brand-cyan cursor-pointer">
              <span id="set-output-vol-label" class="text-xs text-gray-400 font-mono w-8 text-right">100%</span>
            </div>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-xs text-gray-400 font-medium flex items-center gap-1.5">
              <i class="ph ph-microphone text-sm text-brand-cyan/70"></i>
              마이크 게인
            </span>
            <div class="flex items-center gap-2">
              <input id="set-input-gain" type="range" min="0" max="200" value="100" step="5"
                class="w-24 h-1 accent-brand-cyan cursor-pointer">
              <span id="set-input-gain-label" class="text-xs text-gray-400 font-mono w-8 text-right">100%</span>
            </div>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-xs text-gray-400 font-medium">노이즈 억제</span>
            <button id="set-ns" class="px-2 py-0.5 rounded text-xs font-mono font-medium border transition-colors bg-green-500/20 text-green-400 border-green-500/30" data-on="true">ON</button>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-xs text-gray-400 font-medium">에코 캔슬</span>
            <button id="set-aec" class="px-2 py-0.5 rounded text-xs font-mono font-medium border transition-colors bg-green-500/20 text-green-400 border-green-500/30" data-on="true">ON</button>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-xs text-gray-400 font-medium">자동 게인 (AGC)</span>
            <button id="set-agc" class="px-2 py-0.5 rounded text-xs font-mono font-medium border transition-colors bg-green-500/20 text-green-400 border-green-500/30" data-on="true">ON</button>
          </div>
        </div>
        <!-- PTT Power State 설정 -->
        <div class="pt-2 border-t border-white/5 space-y-3">
          <div class="flex items-center justify-between">
            <span class="text-xs text-gray-400 font-medium flex items-center gap-1.5">
              <i class="ph ph-hand-tap text-sm text-brand-cyan/70"></i>
              HOT-STANDBY 진입
            </span>
            <select id="set-ptt-hot-standby" class="bg-brand-dark border border-white/10 rounded px-2 py-1 text-xs text-white font-mono w-20">
              <option value="0">0s</option>
              <option value="10" selected>10s</option>
              <option value="20">20s</option>
              <option value="30">30s</option>
              <option value="40">40s</option>
              <option value="50">50s</option>
              <option value="60">60s</option>
              <option value="70">70s</option>
              <option value="80">80s</option>
              <option value="90">90s</option>
              <option value="100">100s</option>
              <option value="110">110s</option>
              <option value="120">120s</option>
            </select>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-xs text-gray-400 font-medium flex items-center gap-1.5">
              <i class="ph ph-battery-medium text-sm text-brand-cyan/70"></i>
              WARM 진입
            </span>
            <select id="set-ptt-warm" class="bg-brand-dark border border-white/10 rounded px-2 py-1 text-xs text-white font-mono w-20">
              <option value="30">30s</option>
              <option value="60" selected>60s</option>
              <option value="120">120s</option>
              <option value="180">180s</option>
              <option value="600">600s</option>
            </select>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-xs text-gray-400 font-medium flex items-center gap-1.5">
              <i class="ph ph-battery-low text-sm text-brand-cyan/70"></i>
              COLD 진입
            </span>
            <select id="set-ptt-cold" class="bg-brand-dark border border-white/10 rounded px-2 py-1 text-xs text-white font-mono w-20">
              <option value="0" selected>OFF</option>
              <option value="30">30s</option>
              <option value="60">60s</option>
              <option value="120">120s</option>
              <option value="240">240s</option>
              <option value="300">300s</option>
              <option value="600">600s</option>
              <option value="1800">1800s</option>
              <option value="3600">3600s</option>
            </select>
          </div>
        </div>
        <p class="text-xs text-gray-500">
          ※ 화질은 다음 입장 시, 나머지는 즉시 적용
        </p>
      </div>
    </div>

    <!-- Main -->
    <main
      class="flex-grow flex flex-col p-4 gap-4 overflow-hidden relative max-w-lg mx-auto w-full"
    >
      <!-- 연결 패널 -->
      <div
        class="bg-brand-surface rounded-lg border border-white/10 p-3 flex-none z-20 space-y-2"
      >
        <div class="flex gap-2 items-center">
          <select
            id="srv-url"
            class="flex-1 bg-brand-dark border border-white/10 rounded px-3 py-2 text-sm text-white font-mono focus:outline-none focus:border-brand-cyan/30"
          >
            <option value="ws://127.0.0.1:1974/ws">localhost (ws)</option>
            <option value="ws://192.168.0.29:1974/ws">RPi 서버 (ws)</option>
            <option value="ws://192.168.0.25:1974/ws">개발 노트북 (ws)</option>
            <option value="wss://www.oxlens.com/ws">oxlens.com (wss)</option>
          </select>
          <input
            type="text"
            id="user-id"
            value=""
            class="w-16 bg-brand-dark border border-white/10 rounded px-2 py-2 text-sm text-white text-center font-mono focus:outline-none focus:border-brand-cyan/30"
            placeholder="ID"
          />
          <!-- 전원 버튼 (연결/해제) -->
          <button
            id="btn-connect"
            class="w-10 h-10 rounded-full bg-brand-surface border border-white/10 text-gray-400 flex items-center justify-center transition-colors hover:bg-white/5 hover:text-brand-cyan"
            title="연결"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 3v5"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M18.36 6.64A9 9 0 1 1 5.64 6.64"
              />
            </svg>
          </button>
        </div>
        <div class="flex gap-2 items-center">
          <select
            id="room-select"
            class="flex-1 bg-brand-dark border border-white/10 rounded px-3 py-2 text-sm text-white font-mono focus:outline-none focus:border-brand-cyan/30"
          >
            <option value="">방 선택</option>
          </select>
          <!-- 입장/퇴장 버튼 -->
          <button
            id="btn-room"
            class="w-10 h-10 rounded-full bg-brand-surface border border-white/10 text-gray-400 flex items-center justify-center transition-colors hover:bg-white/5 hover:text-brand-cyan disabled:opacity-50"
            title="입장"
            disabled
          >
            <!-- door-enter -->
            <svg
              id="icon-room-enter"
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"
              />
            </svg>
            <!-- door-exit -->
            <svg
              id="icon-room-exit"
              class="w-5 h-5 hidden"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
              />
            </svg>
          </button>
        </div>
      </div>

      <!-- 미디어 컨트롤 (방 선택 아래, conference-zone 위) -->
      <div
        id="conf-controls"
        class="flex-none bg-brand-surface rounded-lg border border-white/10 px-4 py-2.5 flex items-center justify-between opacity-30 pointer-events-none"
      >
          <!-- 좌측 그룹: 잠금 + 긴급발언 + 카메라 전환 -->
          <div class="flex items-center gap-2">
            <!-- 컨트롤 잠금 (포켓 오작동 방지) -->
            <button
              id="btn-ctrl-lock"
              class="w-11 h-11 rounded-full bg-brand-surface border border-white/10 text-gray-400 flex items-center justify-center transition-colors hover:bg-white/5 relative overflow-hidden"
              title="컨트롤 잠금"
            >
              <i id="icon-lock-off" class="ph ph-lock-simple-open text-lg"></i>
              <i id="icon-lock-on" class="ph ph-lock-simple text-lg hidden"></i>
            </button>
            <!-- 긴급발언 토글 (PTT 모드에서만 표시) -->
            <button
              id="btn-ptt-lock"
              class="hidden w-11 h-11 rounded-full border-2 border-red-500/50 text-red-400 items-center justify-center transition-all hover:bg-red-500/10"
              title="긴급발언 (토글)"
            >
              <i class="ph ph-megaphone-simple text-lg"></i>
            </button>
            <!-- 카메라 전환 -->
            <button
              id="conf-btn-camera"
              class="w-11 h-11 rounded-full bg-brand-surface border border-white/10 text-white flex items-center justify-center transition-colors hover:bg-white/5 hover:border-brand-cyan/30"
              title="카메라 전환"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
                />
              </svg>
            </button>
          </div>
          <!-- 우측 그룹: 비디오 + 마이크 + 스피커 -->
          <div class="flex items-center gap-4">
            <!-- 비디오 on/off -->
            <button
              id="conf-btn-video"
              class="w-11 h-11 rounded-full bg-brand-surface border border-white/10 text-white flex items-center justify-center transition-colors hover:bg-white/5 hover:border-brand-cyan/30"
              title="비디오 차단"
            >
              <svg
                id="icon-video-on"
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"
                />
              </svg>
              <svg
                id="icon-video-off"
                class="w-5 h-5 hidden"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"
                />
                <line
                  x1="3"
                  y1="3"
                  x2="21"
                  y2="21"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>
            <!-- 마이크 on/off -->
            <button
              id="conf-btn-mic"
              class="w-11 h-11 rounded-full bg-brand-surface border border-white/10 text-white flex items-center justify-center transition-colors hover:bg-white/5 hover:border-brand-cyan/30"
              title="마이크"
            >
              <svg
                id="icon-mic-on"
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4M12 3a4 4 0 014 4v4a4 4 0 01-8 0V7a4 4 0 014-4z"
                />
              </svg>
              <svg
                id="icon-mic-off"
                class="w-5 h-5 hidden"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4M12 3a4 4 0 014 4v4a4 4 0 01-8 0V7a4 4 0 014-4z"
                />
                <line
                  x1="3"
                  y1="3"
                  x2="21"
                  y2="21"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>
            <!-- 스피커 on/off -->
            <button
              id="conf-btn-speaker"
              class="w-11 h-11 rounded-full bg-brand-surface border border-white/10 text-white flex items-center justify-center transition-colors hover:bg-white/5 hover:border-brand-cyan/30"
              title="스피커"
            >
              <svg
                id="icon-speaker-on"
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"
                />
              </svg>
              <svg
                id="icon-speaker-off"
                class="w-5 h-5 hidden"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"
                />
                <line
                  x1="17"
                  y1="9"
                  x2="23"
                  y2="15"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
                <line
                  x1="23"
                  y1="9"
                  x2="17"
                  y2="15"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>
          </div>
          <!-- /우측 그룹 -->
      </div>

      <!-- Conference 영역 -->
      <div
        id="conference-zone"
        class="flex-grow flex flex-col overflow-hidden rounded-lg bg-brand-surface border border-white/10 relative"
      >
        <!-- Conference 그리드 (컨퍼런스 모드) -->
        <div
          id="conf-grid"
          class="flex-grow grid gap-2 p-3 overflow-hidden"
          style="grid-template-columns: 1fr; grid-auto-rows: 1fr"
        ></div>

        <!-- PTT 뷰 (무전기 모드 — 전체 영역이 터치/영상) -->
        <div
          id="ptt-view"
          class="hidden flex-grow flex flex-col items-center justify-center relative select-none"
          style="touch-action: none;"
        >
          <!-- 발화자 영상 (전체 화면) -->
          <video
            id="ptt-video"
            class="hidden absolute inset-0 w-full h-full object-cover"
            autoplay playsinline
          ></video>

          <!-- IDLE 대기 화면 -->
          <div id="ptt-idle-screen" class="flex flex-col items-center gap-3 z-10">
            <i class="ph ph-hand-tap text-7xl text-blue-400/70 animate-pulse"></i>
            <span class="text-sm text-blue-400/50 font-bold uppercase tracking-widest">TAP</span>
            <p class="text-xs text-gray-600 mt-1">화면을 길게 눌러 말하기</p>
          </div>

          <!-- REQUESTING 대기 화면 -->
          <div id="ptt-requesting-screen" class="hidden flex flex-col items-center gap-3 z-10">
            <i class="ph ph-hand-tap text-7xl text-yellow-400/70 animate-pulse"></i>
            <span class="text-sm text-yellow-400/60 font-bold uppercase tracking-widest">REQUESTING</span>
          </div>

          <!-- 발화 상태 오버레이 (우측 상단) -->
          <div id="ptt-talk-overlay" class="hidden absolute top-3 right-3 flex flex-col items-end gap-1.5 z-20">
            <div id="ptt-talk-badge" class="px-3 py-1 rounded-full text-xs font-mono font-bold shadow-lg"></div>
            <span id="ptt-talk-timer" class="hidden text-white/50 text-[10px] font-mono tabular-nums pr-1"></span>
          </div>

          <!-- Revoke 토스트 -->
          <div id="ptt-revoke-toast" class="hidden absolute bottom-20 left-4 right-4 bg-red-900/90 border border-red-500/40 rounded-lg px-4 py-2.5 text-center z-30">
            <span class="text-red-300 text-sm font-mono">시간 초과 — 발화권이 회수되었습니다</span>
          </div>
        </div>
      </div>
    </main>

    <!-- 토스트 컨테이너 (우측 상단, 스택) -->
    <div id="toast-container" class="fixed top-16 right-4 z-40 flex flex-col-reverse gap-2 pointer-events-none" style="max-width: 280px"></div>

    <!-- 범용 실패 모달 -->
    <div id="modal-fail" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60">
      <div class="bg-brand-surface border border-white/10 rounded-xl shadow-2xl p-6 max-w-xs w-full mx-4 space-y-4">
        <div class="flex items-center gap-2 text-red-400">
          <i class="ph ph-warning-circle text-2xl"></i>
          <span id="modal-fail-title" class="font-bold text-sm">오류</span>
        </div>
        <p id="modal-fail-msg" class="text-xs text-gray-400"></p>
        <div class="flex gap-2">
          <button id="modal-fail-cancel" class="flex-1 px-3 py-2 rounded-lg bg-brand-dark border border-white/10 text-gray-400 text-xs font-medium hover:bg-white/5 transition-colors">닫기</button>
          <button id="modal-fail-retry" class="flex-1 px-3 py-2 rounded-lg bg-brand-rust text-white text-xs font-bold hover:bg-brand-rust/80 transition-colors">재시도</button>
        </div>
      </div>
    </div>

    <audio id="remote-audio" autoplay playsinline style="display: none"></audio>
    <script type="module" src="./app.js"></script>
  </body>
</html>
